version: "3"

vars:
  BINARY: runnerd
  IMAGE: ghcr.io/qiniu/ci-runner
  LDFLAGS: "-s -w"
  TEMPLATE_DIR: templates/github-runner-ubuntu-24.04
  QBOX_KODO_TEMPLATE_DIR: templates/qbox-kodo-ubuntu-16.04
  QBOX_KODO_BASE_IMAGE: jimyag/qbox-kodo-ubuntu-16.04-base:runner-docker
  GO_PACKAGES: "./cmd/... ./internal/..."

tasks:
  default:
    desc: List all tasks
    cmds:
      - task --list-all
    silent: true

  deps:
    desc: Install local development tools
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install mvdan.cc/gofumpt@latest
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/cespare/reflex@latest
      - go install github.com/go-task/task/v3/cmd/task@latest
      - go install github.com/goreleaser/goreleaser/v2@latest

  fmt:
    desc: Format Go code
    cmds:
      - gofumpt -w cmd internal
      - goimports -w cmd internal

  ui-deps:
    desc: Install UI dependencies
    dir: ui
    cmds:
      - bun install --frozen-lockfile

  ui-build:
    desc: Build the embedded UI
    dir: ui
    cmds:
      - bun install --frozen-lockfile
      - bun run build

  ui-lint:
    desc: Lint and type-check the UI
    dir: ui
    cmds:
      - bun install --frozen-lockfile
      - bun run lint
      - bun run build

  lint:
    desc: Run staticcheck, formatting checks, goimports checks, and go vet
    deps:
      - ui-build
    cmds:
      - staticcheck {{.GO_PACKAGES}}
      - cmd: |
          UNFORMATTED=$(gofmt -l cmd internal)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: gofmt -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi
      - cmd: |
          UNFORMATTED=$(gofumpt -l cmd internal)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: gofumpt -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi
      - cmd: |
          UNFORMATTED=$(goimports -l cmd internal)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: goimports -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi
      - go vet {{.GO_PACKAGES}}
      - task: ui-lint

  test:
    desc: Run tests with the race detector and coverage
    deps:
      - ui-build
    cmds:
      - GORACE=atexit_sleep_ms=0 go test -v -trimpath -failfast -race -cover -coverprofile=coverage.txt {{.GO_PACKAGES}}

  build:
    desc: Build the local binary into bin/
    deps:
      - ui-build
    cmds:
      - mkdir -p bin
      - go build -trimpath -buildvcs=true -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY}} ./cmd/{{.BINARY}}

  run:
    desc: Run the service locally
    deps:
      - ui-build
    cmds:
      - go run ./cmd/{{.BINARY}} {{.CLI_ARGS}}

  dev:
    desc: Start the UI Vite dev server, smee webhook forwarder, and runnerd with hot reload
    cmds:
      - |
        command -v reflex >/dev/null 2>&1 || {
          echo "reflex is required for task dev. Run: task deps" >&2
          exit 1
        }
        test -x ui/node_modules/.bin/vite || {
          echo "UI dependencies are missing. Run: task ui-deps" >&2
          exit 1
        }

        export RUNNERD_CONFIG="${RUNNERD_CONFIG:-runnerd.local.yaml}"
        test -f "${RUNNERD_CONFIG}" || {
          echo "runnerd config not found: ${RUNNERD_CONFIG}" >&2
          echo "Create one from runnerd.yaml.example, then update local secrets and OAuth settings." >&2
          exit 1
        }
        export RUNNERD_VITE_PORT="${RUNNERD_VITE_PORT:-5173}"
        export RUNNERD_VITE_DEV_SERVER_URL="${RUNNERD_VITE_DEV_SERVER_URL:-http://127.0.0.1:${RUNNERD_VITE_PORT}}"

        echo "Starting UI on ${RUNNERD_VITE_DEV_SERVER_URL}"
        echo "Starting runnerd with ${RUNNERD_CONFIG}"

        (
          cd ui
          exec bun run dev --host 127.0.0.1 --port "${RUNNERD_VITE_PORT}" --strictPort
        ) &
        UI_PID="$!"
        ./scripts/smee.sh &
        SMEE_PID="$!"
        trap 'kill "$UI_PID" "$SMEE_PID" 2>/dev/null || true' EXIT
        sleep 1
        if ! kill -0 "$UI_PID" 2>/dev/null; then
          echo "UI dev server failed to start on ${RUNNERD_VITE_DEV_SERVER_URL}" >&2
          exit 1
        fi

        reflex \
          -d none -s \
          -r '\.go$' \
          -R '\.git/' \
          -R 'bin/' \
          -R 'dist/' \
          -R 'docs/' \
          -R 'templates/' \
          -R 'ui/' \
          -R 'var/' \
          -- go run -trimpath -tags development ./cmd/{{.BINARY}} --config "${RUNNERD_CONFIG}" {{.CLI_ARGS}}

  smee:
    desc: Start the smee.io webhook forwarder standalone (reads .smee-url)
    cmds:
      - ./scripts/smee.sh

  docker-build:
    desc: Build the local Docker image
    deps:
      - ui-build
    cmds:
      - docker build -t {{.IMAGE}}:local .

  docker-check:
    desc: Check Dockerfiles without building image layers
    cmds:
      - docker build --check -f Dockerfile .
      - docker build --check --platform=linux/amd64 -f {{.TEMPLATE_DIR}}/e2b.Dockerfile {{.TEMPLATE_DIR}}
      - docker build --check --platform=linux/amd64 -f {{.QBOX_KODO_TEMPLATE_DIR}}/base.Dockerfile {{.QBOX_KODO_TEMPLATE_DIR}}
      - docker build --check --platform=linux/amd64 -f {{.QBOX_KODO_TEMPLATE_DIR}}/e2b.Dockerfile {{.QBOX_KODO_TEMPLATE_DIR}}

  template-deps:
    desc: Install E2B template dependencies
    dir: "{{.TEMPLATE_DIR}}"
    cmds:
      - npm install

  template-build-dev:
    desc: Build the development E2B sandbox template
    dir: "{{.TEMPLATE_DIR}}"
    cmds:
      - npm run build:dev

  template-build-prod:
    desc: Build the production E2B sandbox template
    dir: "{{.TEMPLATE_DIR}}"
    cmds:
      - npm run build:prod

  qbox-kodo-base-build:
    desc: Build the qbox kodo Ubuntu 16.04 base Docker image locally
    cmds:
      - docker build --platform=linux/amd64 -f {{.QBOX_KODO_TEMPLATE_DIR}}/base.Dockerfile -t {{.QBOX_KODO_BASE_IMAGE}} {{.QBOX_KODO_TEMPLATE_DIR}}

  qbox-kodo-base-push:
    desc: Push the qbox kodo Ubuntu 16.04 base Docker image
    deps:
      - qbox-kodo-base-build
    cmds:
      - docker push {{.QBOX_KODO_BASE_IMAGE}}

  qbox-kodo-template-deps:
    desc: Install qbox kodo E2B template dependencies
    dir: "{{.QBOX_KODO_TEMPLATE_DIR}}"
    cmds:
      - npm install

  qbox-kodo-template-build-prod:
    desc: Build the qbox kodo production E2B sandbox template
    dir: "{{.QBOX_KODO_TEMPLATE_DIR}}"
    cmds:
      - npm run build:prod

  release-check:
    desc: Validate the GoReleaser configuration
    cmds:
      - goreleaser check

  release-snapshot:
    desc: Dry-run a GoReleaser release locally without publishing
    deps:
      - ui-build
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: Remove generated local build artifacts
    cmds:
      - rm -rf bin dist coverage.txt ui/node_modules
