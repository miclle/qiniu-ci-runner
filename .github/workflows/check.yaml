name: Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile && bun run build
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./cmd/... ./internal/...

  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: |
          UNFORMATTED=$(gofmt -l cmd internal)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: gofmt -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi

  gofumpt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: go install mvdan.cc/gofumpt@latest
      - run: |
          UNFORMATTED=$(gofumpt -l cmd internal)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: gofumpt -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi

  goimports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: go install golang.org/x/tools/cmd/goimports@latest
      - run: |
          UNFORMATTED=$(goimports -l cmd internal)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: goimports -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile && bun run build
      - run: go vet ./cmd/... ./internal/...

  gomod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile && bun run build
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile && bun run build
      - run: GORACE=atexit_sleep_ms=0 go test -v -trimpath -failfast -race -cover -coverprofile=coverage.txt ./cmd/... ./internal/...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile && bun run build
      - run: go build -trimpath -buildvcs=true -ldflags "-s -w" -o bin/runnerd ./cmd/runnerd

  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - uses: oven-sh/setup-bun@v2
      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check
      - name: Build release archives
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean --skip=docker
      - name: Verify release archive contents
        run: |
          for archive in dist/*.tar.gz; do
            echo "checking $archive"
            if tar -tzf "$archive" | grep -E '(^|/)(README|LICENSE)'; then
              echo "$archive contains non-binary release files"
              exit 1
            fi
            test "$(tar -tzf "$archive" | wc -l | tr -d ' ')" = "1"
          done

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile && bun run build
      - name: Check service Dockerfile
        run: docker build --check -f Dockerfile .
      - name: Check E2B template Dockerfile
        run: docker build --check --platform=linux/amd64 -f templates/github-runner-ubuntu-24.04/e2b.Dockerfile templates/github-runner-ubuntu-24.04
