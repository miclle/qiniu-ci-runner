# qbox kodo Ubuntu 16.04 Qiniu sandbox template.
#
# This tracked file is the stable build input. Use Taskfile build targets so
# qshell writes any generated template_id only to a temporary copy:
#   task qbox-kodo-template-build-prod
#
# Prefer a stable name over a committed environment-specific template_id.

name = "qbox-kodo-ubuntu-16-04"
dockerfile = "./Dockerfile"
path = "."
cpu_count = 8
memory_mb = 8192
no_cache = false
