version: 2

project_name: e2b-github-runner

before:
  hooks:
    - sh -c "cd ui && bun install --frozen-lockfile && bun run build"

builds:
  - id: runnerd
    main: ./cmd/runnerd
    binary: runnerd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - none*

dockers_v2:
  - id: e2b-github-runner
    ids:
      - runnerd
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - "ghcr.io/jimyag/e2b-github-runner"
    tags:
      - "{{ .Tag }}"
      - "latest"
    dockerfile: Dockerfile.release
    sbom: none
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Tag}}"

release:
  github:
    owner: jimyag
    name: e2b-github-runner
  mode: replace

changelog:
  use: github-native
